# nginx equivalent of public/uploads/.htaccess — defense in depth.
#
# The application already only stores validated images with random names, so a
# script can't normally reach this directory. This block is the extra layer:
# it guarantees nothing under /uploads is ever handed to the PHP (or any other)
# handler, even if a file slipped through.
#
# Add this INSIDE your existing `server { ... }` block, BEFORE the generic
# `location ~ \.php$ { fastcgi_pass ...; }` location. The `^~` prefix makes it
# win over the regex PHP location.

location ^~ /uploads/ {
    # Serve uploaded files as static content only.
    try_files $uri =404;

    # Never execute anything here as code.
    location ~* \.(php|php\d|phtml|pht|phar|cgi|pl|py|asp|aspx|jsp|sh)$ {
        deny all;
        return 403;
    }
}
